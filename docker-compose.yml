services:
  tests:
    build: ./
    working_dir: /project
    entrypoint: ["/usr/local/bin/entrypoint.sh", "./vendor/bin/phpunit"]
    volumes:
      - ./:/project
  analysis:
    build: ./
    working_dir: /project
    entrypoint: ["/usr/local/bin/entrypoint.sh", "./vendor/bin/phpstan", "analyze", "--memory-limit=512M"]
    volumes:
      - ./:/project
  standards:
    build: ./
    working_dir: /project
    entrypoint: ["/usr/local/bin/entrypoint.sh", "./vendor/bin/phpcs"]
    volumes:
      - ./:/project
